{% extends "productos/base.html" %}

{% block title %}Eliminar Cotización — Maxi Plásticos{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 3rem auto;">
  <div class="card" style="text-align: center; padding: 2rem;">
    <h2 style="color: var(--maxi-rojo-cta); margin-bottom: 1rem;">Eliminar cotización</h2>
    <p style="margin-bottom: 0.5rem;">¿Estás seguro que deseas eliminar:</p>
    <p style="font-weight: 800; font-size: 1.1rem; margin-bottom: 0.3rem;">{{ object.numero }}</p>
    <p style="color: #777; font-size: 0.9rem; margin-bottom: 1.5rem;">Cliente: {{ object.cliente_nombre }}</p>
    <form method="post">
      {% csrf_token %}
      <div style="display: flex; gap: 0.8rem; justify-content: center;">
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
        <a href="{% url 'historial_cotizaciones' %}" class="btn btn-outline">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
